# ── 데이터소스 ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/markdowncanvas?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123412}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── 서버 ──────────────────────────────────────────────────────────────────────
server.port=8080

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.access-secret=${JWT_ACCESS_SECRET:yL5juzzBZf2gu9yxuRSoSkOt5GA0nuiFIVqCw7aMAbcPJ5S3VprB2Nze7FJADl1AbWms6hSaxQ0ZZWv37NsWGQ==}
jwt.refresh-secret=${JWT_REFRESH_SECRET:yL5juzzBZf2gu9yxuRSoSkOt5GA0nuiFIVqCw7aMAbcPJ5S3VprB2Nze7FJADl1AbWms6hSaxQ0ZZWv37NsWGQ==}
jwt.access-ttl-seconds=3600
jwt.refresh-ttl-seconds=604800

# ── 앱 설정 ───────────────────────────────────────────────────────────────────
app.cors-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:5173}
app.seed-data=${SEED_DATA:true}

# ── S3 ─────────────────────────────────────────────────────────────────────────
app.s3.bucket=${S3_BUCKET:markvas-frontend}
app.s3.region=${S3_REGION:ap-northeast-2}
app.s3.cdn-base=${S3_CDN_BASE:https://d36v39m4b0nmuu.cloudfront.net}
