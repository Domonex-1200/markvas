spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME:markdowncanvas}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=false&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.port=${PORT:8080}
jwt.access-secret=${JWT_ACCESS_SECRET}
jwt.refresh-secret=${JWT_REFRESH_SECRET}
jwt.access-ttl-seconds=3600
jwt.refresh-ttl-seconds=604800
app.cors-origins=${CORS_ORIGINS}
app.seed-data=${SEED_DATA:false}
